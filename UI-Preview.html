<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG Converter - UI Preview</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .window {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 700px;
            overflow: hidden;
        }
        .title-bar {
            background: #0078d4;
            color: white;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            font-size: 12px;
        }
        .title-bar-buttons {
            display: flex;
            gap: 8px;
            margin-right: 10px;
        }
        .title-bar-buttons span {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.3);
        }
        .content {
            padding: 20px;
        }
        h1 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #333;
            font-size: 14px;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            background: #f5f5f5;
            color: #999;
        }
        button {
            padding: 8px 20px;
            background: #0078d4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            min-width: 100px;
            transition: background 0.2s;
        }
        button:hover {
            background: #106ebe;
        }
        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-group input[type="range"] {
            flex: 1;
            height: 6px;
        }
        .quality-value {
            font-weight: bold;
            min-width: 50px;
            text-align: right;
            font-size: 14px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }
        .button-group button {
            flex: 1;
            padding: 12px;
            font-size: 14px;
            height: 45px;
        }
        .progress-container {
            margin: 15px 0;
        }
        .progress-bar {
            width: 100%;
            height: 25px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #0078d4, #00bcf2);
            transition: width 0.3s;
        }
        .status {
            margin: 10px 0;
            color: #666;
            font-size: 14px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-bar-buttons">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <span>PDF to JPG Converter</span>
        </div>
        <div class="content">
            <h1>PDF to JPG Converter</h1>

            <div class="form-group">
                <label>PDFファイル:</label>
                <div class="input-group">
                    <input type="text" value="PDFファイルを選択してください" readonly>
                    <button>選択</button>
                </div>
            </div>

            <div class="form-group">
                <label>出力先フォルダ:</label>
                <div class="input-group">
                    <input type="text" value="出力先フォルダを選択してください" readonly>
                    <button>選択</button>
                </div>
            </div>

            <div class="form-group">
                <label>画質設定:</label>
                <div class="slider-group">
                    <input type="range" min="10" max="100" value="85" style="width: 100%;">
                    <span class="quality-value">85%</span>
                </div>
            </div>

            <div class="button-group">
                <button>単一ファイル変換</button>
                <button>フォルダ内のPDFを一括変換</button>
            </div>

            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>

            <div class="status">ステータス: 待機中...</div>

            <div class="checkbox-group">
                <input type="checkbox" checked>
                <label>変換後にフォルダを開く</label>
            </div>
        </div>
    </div>

    <script>
        // スライダーの値を更新
        const slider = document.querySelector('input[type="range"]');
        const qualityValue = document.querySelector('.quality-value');
        slider.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value + '%';
        });
    </script>
</body>
</html>
